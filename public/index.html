<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Algebra Tools</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e0e0e0;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: #1a1a2e;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 8px 40px rgba(0,0,0,.5);
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #7eb8f7, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 28px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input[type="url"] {
      flex: 1;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #0f0f1a;
      color: #e0e0e0;
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
    }

    input[type="url"]:focus {
      border-color: #7eb8f7;
    }

    button {
      padding: 12px 22px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #5b9cf6, #7c3aed);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
      white-space: nowrap;
    }

    button:hover { opacity: .85; }

    .note {
      margin-top: 20px;
      font-size: 12px;
      color: #555;
      line-height: 1.6;
    }

    .quick-links {
      margin-top: 28px;
      border-top: 1px solid #252540;
      padding-top: 20px;
    }

    .quick-links p {
      font-size: 12px;
      color: #666;
      margin-bottom: 10px;
    }

    .quick-links a {
      display: inline-block;
      margin: 4px 6px 4px 0;
      padding: 5px 12px;
      border-radius: 20px;
      background: #252540;
      color: #aaa;
      font-size: 12px;
      text-decoration: none;
      transition: background .2s;
    }

    .quick-links a:hover {
      background: #333360;
      color: #e0e0e0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Web Proxy</h1>
    <p class="subtitle">Browse websites anonymously through this proxy.</p>

    <form id="proxyForm" onsubmit="navigate(event)">
      <div class="input-row">
        <input
          type="text"
          id="urlInput"
          placeholder="https://example.com"
          autocomplete="off"
          spellcheck="false"
        />
        <button type="submit">Go</button>
      </div>
    </form>

    <div class="quick-links">
      <p>Quick links</p>
      <a href="#" onclick="go('https://wikipedia.org')">Wikipedia</a>
      <a href="#" onclick="go('https://news.ycombinator.com')">Hacker News</a>
      <a href="#" onclick="go('https://reddit.com')">Reddit</a>
      <a href="#" onclick="go('https://github.com')">GitHub</a>
    </div>

    <p class="note">
      Note: Some sites with strict CSP headers or heavy JavaScript may not render correctly.
    </p>
  </div>

  <script>
    function navigate(e) {
      e.preventDefault();
      let url = document.getElementById('urlInput').value.trim();
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
      }
      window.location.href = '/api/proxy?url=' + encodeURIComponent(url);
    }

    function go(url) {
      window.location.href = '/api/proxy?url=' + encodeURIComponent(url);
    }
  </script>
</body>
</html>
